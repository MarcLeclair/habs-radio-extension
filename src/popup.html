<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="hdr">
    <span class="title">🏒 Habs Radio Sync</span>
  </div>

  <section class="current">
    <div class="label">Current site</div>
    <div class="host" id="current-host">—</div>
    <button id="current-action" disabled>—</button>
    <div class="hint" id="current-hint"></div>
  </section>

  <section class="list">
    <div class="label">Enabled sites</div>
    <ul id="domain-list"></ul>
    <div class="empty" id="empty-msg" hidden>No extra sites enabled yet.</div>
  </section>

  <div class="footnote">
    Built-in sites (Sportsnet, RDS, TVA Sports) are always enabled.
  </div>

  <script src="host-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
