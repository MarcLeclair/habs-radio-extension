<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="hdr">
    <span class="title" data-i18n="panelTitle"></span>
  </div>

  <section class="current">
    <div class="label" data-i18n="popupCurrentSite"></div>
    <div class="host" id="current-host">—</div>
    <button id="current-action" disabled>—</button>
    <div class="hint" id="current-hint"></div>
  </section>

  <section class="list">
    <div class="label" data-i18n="popupEnabledSites"></div>
    <ul id="domain-list"></ul>
    <div class="empty" id="empty-msg" data-i18n="popupEmptyList" hidden></div>
  </section>

  <div class="footnote" data-i18n="popupFootnote"></div>

  <script src="host-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
